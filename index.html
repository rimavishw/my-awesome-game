
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Gesture Game</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Full screen webcam */
    #bgVideo {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 0;
    }

    /* Game canvas — full screen, transparent, on top */
    #gameCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 2;
      background: transparent;
    }

    /* Finger dot canvas — also full screen */
    #dotCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 3;
      pointer-events: none;
    }

    /* HUD — score on top of everything */
    #hud {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      text-align: center;
      color: #fff;
      text-shadow: 0 0 10px #000, 0 0 20px #000;
    }

    #hud h1 {
      font-size: 1.6rem;
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc, 0 0 5px #000;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }

    #scoreBoard {
      font-size: 1rem;
      color: #fff;
    }

    #scoreBoard span { color: #00ffcc; font-weight: bold; }

    #status {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #ccc;
    }

    #status.ready { color: #00ffcc; }
    #status.error { color: #ff4757; }

    #directionDisplay {
      font-size: 1.3rem;
      min-height: 28px;
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc;
    }
  </style>
</head>
<body>

  <!-- Webcam background -->
  <video id="bgVideo" autoplay playsinline muted></video>

  <!-- Transparent game canvas (snake + food only) -->
  <canvas id="gameCanvas"></canvas>

  <!-- Finger dot overlay -->
  <canvas id="dotCanvas"></canvas>

  <!-- Score HUD -->
  <div id="hud">
    <h1>🐍 Snake Gesture</h1>
    <div id="scoreBoard">
      Score: <span id="scoreVal">0</span> &nbsp;|&nbsp; Best: <span id="bestVal">0</span>
    </div>
    <div id="status">⏳ Starting webcam...</div>
    <div id="directionDisplay"></div>
  </div>

  <script>
    // ─── CONFIG ────────────────────────────────────────────────
    const TILE_SIZE = 28;       // bigger tiles so snake is visible on full screen
    const SPEED     = 150;
    const DEAD_ZONE = 0.25;

    // ─── CANVAS SETUP ──────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');

    const dotCanvas = document.getElementById('dotCanvas');
    const dCtx      = dotCanvas.getContext('2d');

    let COLS, ROWS;

    function resizeCanvas() {
      canvas.width    = window.innerWidth;
      canvas.height   = window.innerHeight;
      dotCanvas.width  = window.innerWidth;
      dotCanvas.height = window.innerHeight;
      COLS = Math.floor(canvas.width  / TILE_SIZE);
      ROWS = Math.floor(canvas.height / TILE_SIZE);
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ─── UI ────────────────────────────────────────────────────
    const scoreVal         = document.getElementById('scoreVal');
    const bestVal          = document.getElementById('bestVal');
    const statusDiv        = document.getElementById('status');
    const directionDisplay = document.getElementById('directionDisplay');

    // ─── SOUND ENGINE ──────────────────────────────────────────
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playEatSound() {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(440, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
      g.gain.setValueAtTime(0.3, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      o.start(); o.stop(audioCtx.currentTime + 0.2);
    }

    function playGameOverSound() {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(300, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
      g.gain.setValueAtTime(0.4, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      o.start(); o.stop(audioCtx.currentTime + 0.5);
    }

    function playRestartSound() {
      [261, 329, 392, 523].forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine';
        o.frequency.value = freq;
        const t = audioCtx.currentTime + i * 0.08;
        g.gain.setValueAtTime(0.2, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        o.start(t); o.stop(t + 0.15);
      });
    }

    // ─── PARTICLES ─────────────────────────────────────────────
    let particles = [];

    function spawnParticles(col, row) {
      const cx = col * TILE_SIZE + TILE_SIZE / 2;
      const cy = row * TILE_SIZE + TILE_SIZE / 2;
      for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 / 12) * i;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * (2 + Math.random() * 3),
          vy: Math.sin(angle) * (2 + Math.random() * 3),
          life: 1.0,
          color: ['#ff4757','#ff6b81','#ffdd59','#00ffcc'][Math.floor(Math.random() * 4)],
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => p.life > 0.05);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.life -= 0.05;
        p.vx *= 0.93; p.vy *= 0.93;
      });
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // ─── GAME STATE ────────────────────────────────────────────
    let snake, direction, nextDirection, food, score, bestScore, gameOver;
    let pulseFrame = 0;

    function initGame() {
      const midCol = Math.floor(COLS / 2);
      const midRow = Math.floor(ROWS / 2);
      snake = [
        { col: midCol,     row: midRow },
        { col: midCol - 1, row: midRow },
        { col: midCol - 2, row: midRow },
      ];
      direction     = { col: 1, row: 0 };
      nextDirection = { col: 1, row: 0 };
      food          = spawnFood();
      score         = 0;
      gameOver      = false;
      bestScore     = bestScore || 0;
      particles     = [];
      updateScoreUI();
      playRestartSound();
    }

    function spawnFood() {
      let pos;
      do {
        pos = {
          col: Math.floor(Math.random() * COLS),
          row: Math.floor(Math.random() * ROWS),
        };
      } while (snake.some(s => s.col === pos.col && s.row === pos.row));
      return pos;
    }

    function updateScoreUI() {
      scoreVal.textContent = score;
      bestVal.textContent  = bestScore;
    }

    // ─── KEYBOARD BACKUP ───────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' && gameOver) { initGame(); return; }
      switch (e.key) {
        case 'ArrowUp':
          if (direction.row !== 1) nextDirection = { col: 0, row: -1 }; break;
        case 'ArrowDown':
          if (direction.row !== -1) nextDirection = { col: 0, row: 1 }; break;
        case 'ArrowLeft':
          if (direction.col !== 1) nextDirection = { col: -1, row: 0 }; break;
        case 'ArrowRight':
          if (direction.col !== -1) nextDirection = { col: 1, row: 0 }; break;
      }
    });

    // ─── GESTURE → DIRECTION ───────────────────────────────────
    function mapGestureToDirection(x, y) {
      if (gameOver) return;
      const dx = x - 0.5;
      const dy = y - 0.5;
      if (Math.abs(dx) < DEAD_ZONE && Math.abs(dy) < DEAD_ZONE) {
        directionDisplay.textContent = '⏺ center'; return;
      }
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) {
          if (direction.col !== -1) { nextDirection = { col: 1, row: 0 }; directionDisplay.textContent = '➡️ RIGHT'; }
        } else {
          if (direction.col !== 1)  { nextDirection = { col: -1, row: 0 }; directionDisplay.textContent = '⬅️ LEFT'; }
        }
      } else {
        if (dy > 0) {
          if (direction.row !== -1) { nextDirection = { col: 0, row: 1 }; directionDisplay.textContent = '⬇️ DOWN'; }
        } else {
          if (direction.row !== 1)  { nextDirection = { col: 0, row: -1 }; directionDisplay.textContent = '⬆️ UP'; }
        }
      }
    }

    // ─── OPEN PALM DETECTION ───────────────────────────────────
    function isOpenPalm(landmarks) {
      const tips  = [4, 8, 12, 16, 20];
      const bases = [2, 5, 9,  13, 17];
      let openCount = 0;
      tips.forEach((tip, i) => {
        if (landmarks[tip].y < landmarks[bases[i]].y) openCount++;
      });
      return openCount >= 4;
    }

    let palmHoldFrames = 0;

    // ─── MEDIAPIPE ─────────────────────────────────────────────
    const hands = new Hands({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5,
    });

    hands.onResults((results) => {
      dCtx.clearRect(0, 0, dotCanvas.width, dotCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const tip       = landmarks[8];
        const mirroredX = 1 - tip.x;

        const screenX = mirroredX * dotCanvas.width;
        const screenY = tip.y * dotCanvas.height;

        // Glowing finger dot
        dCtx.beginPath();
        dCtx.arc(screenX, screenY, 18, 0, Math.PI * 2);
        dCtx.fillStyle = 'rgba(0,255,204,0.15)';
        dCtx.fill();

        dCtx.beginPath();
        dCtx.arc(screenX, screenY, 10, 0, Math.PI * 2);
        dCtx.fillStyle = 'rgba(0,255,204,0.4)';
        dCtx.fill();

        dCtx.beginPath();
        dCtx.arc(screenX, screenY, 5, 0, Math.PI * 2);
        dCtx.fillStyle = '#00ffcc';
        dCtx.fill();

        if (gameOver && isOpenPalm(landmarks)) {
          palmHoldFrames++;
          if (palmHoldFrames > 15) { palmHoldFrames = 0; initGame(); }
        } else {
          palmHoldFrames = 0;
          mapGestureToDirection(mirroredX, tip.y);
        }

        statusDiv.textContent = gameOver ? '🖐️ Open palm to restart!' : '✅ Hand detected!';
        statusDiv.className   = 'ready';
      } else {
        palmHoldFrames = 0;
        statusDiv.textContent        = '🖐️ Show your hand to the camera';
        statusDiv.className          = '';
        directionDisplay.textContent = '';
      }
    });

    // ─── START WEBCAM ──────────────────────────────────────────
    const bgVideo = document.getElementById('bgVideo');

    const camera = new Camera(bgVideo, {
      onFrame: async () => { await hands.send({ image: bgVideo }); },
      width: 1280, height: 720,
    });

    camera.start()
      .then(() => { statusDiv.textContent = '🖐️ Show your hand to the camera'; })
      .catch((err) => {
        statusDiv.textContent = '❌ Webcam access denied!';
        statusDiv.className   = 'error';
      });

    // ─── COLLISION ─────────────────────────────────────────────
    function checkSelfCollision(head) {
      return snake.slice(1).some(s => s.col === head.col && s.row === head.row);
    }

    // ─── UPDATE ────────────────────────────────────────────────
    function update() {
      if (gameOver) return;
      direction = nextDirection;

      const head    = snake[0];
      const newHead = {
        col: (head.col + direction.col + COLS) % COLS,
        row: (head.row + direction.row + ROWS) % ROWS,
      };

      if (checkSelfCollision(newHead)) {
        gameOver = true;
        if (score > bestScore) bestScore = score;
        updateScoreUI();
        playGameOverSound();
        return;
      }

      if (newHead.col === food.col && newHead.row === food.row) {
        score++;
        spawnParticles(food.col, food.row);
        food = spawnFood();
        snake.unshift(newHead);
        updateScoreUI();
        playEatSound();
      } else {
        snake.unshift(newHead);
        snake.pop();
      }
    }

    // ─── DRAW ──────────────────────────────────────────────────
    function drawSnake() {
      snake.forEach((seg, i) => {
        // Glowing snake body
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur  = i === 0 ? 18 : 8;
        ctx.fillStyle   = i === 0 ? '#00ffcc' : '#00d4aa';
        ctx.fillRect(
          seg.col * TILE_SIZE + 2,
          seg.row * TILE_SIZE + 2,
          TILE_SIZE - 4,
          TILE_SIZE - 4
        );
        ctx.shadowBlur = 0;

        // Eye on head
        if (i === 0) {
          const ex = seg.col * TILE_SIZE + TILE_SIZE * 0.7;
          const ey = seg.row * TILE_SIZE + TILE_SIZE * 0.3;
          ctx.fillStyle = '#1a1a2e';
          ctx.beginPath(); ctx.arc(ex, ey, 3.5, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(ex, ey, 1.8, 0, Math.PI * 2); ctx.fill();
        }
      });
    }

    function drawFood() {
      pulseFrame++;
      const pulse  = Math.sin(pulseFrame * 0.15) * 3;
      const radius = TILE_SIZE / 2 - 2 + pulse;
      const cx     = food.col * TILE_SIZE + TILE_SIZE / 2;
      const cy     = food.row * TILE_SIZE + TILE_SIZE / 2;

      ctx.shadowColor = '#ff4757';
      ctx.shadowBlur  = 15 + pulse * 2;
      ctx.fillStyle   = '#ff4757';
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawGameOver() {
      // Semi transparent overlay only over center
      const w = canvas.width;
      const h = canvas.height;

      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(w/2 - 220, h/2 - 80, 440, 180);

      ctx.fillStyle = '#ff4757';
      ctx.font      = 'bold 40px Segoe UI';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#ff4757';
      ctx.shadowBlur  = 15;
      ctx.fillText('GAME OVER', w / 2, h / 2 - 25);
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#fff';
      ctx.font      = '22px Segoe UI';
      ctx.fillText(`Score: ${score}`, w / 2, h / 2 + 15);

      if (score === bestScore && score > 0) {
        ctx.fillStyle = '#ffdd59';
        ctx.font      = '15px Segoe UI';
        ctx.fillText('🏆 New Best Score!', w / 2, h / 2 + 42);
      }

      ctx.fillStyle = '#00d4aa';
      ctx.font      = '15px Segoe UI';
      ctx.fillText('Press SPACE or open palm to restart', w / 2, h / 2 + 68);
      ctx.textAlign = 'left';
    }

    function draw() {
      // Clear to fully transparent every frame
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawFood();
      drawSnake();
      updateParticles();
      drawParticles();
      if (gameOver) drawGameOver();
    }

    // ─── GAME LOOP ─────────────────────────────────────────────
    function gameLoop() { update(); draw(); }

    initGame();
    setInterval(gameLoop, SPEED);
  </script>

</body>
</html>
